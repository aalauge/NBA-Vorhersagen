name: KOBRA – Daily NBA Predictions

on:
  # Täglich um 14:00 UTC (Spiele starten meist abends US-Zeit)
  schedule:
    - cron: "0 14 * * *"
  # Manuell auslösbar
  workflow_dispatch:
    inputs:
      date:
        description: "Datum (YYYY-MM-DD), leer = heute"
        required: false
        default: ""

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Quoten holen
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          mkdir -p odds
          python fetch_odds.py || echo "⚠️ Odds fetch fehlgeschlagen – weiter ohne Quoten"

      - name: Vorhersagen erstellen
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python kobra.py $DATE_ARG --output predictions.csv

      - name: Telegram Benachrichtigung
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: |
          python notify_telegram.py || echo "⚠️ Telegram fehlgeschlagen – weiter"

      - name: Ergebnisse als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.event.inputs.date || 'today' }}
          path: predictions.csv
          retention-days: 90

      - name: Ergebnisse ins Repo committen
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p results
          cp predictions.csv "results/predictions_${DATE}.csv"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ odds/
          git diff --staged --quiet || git commit -m "🏀 Predictions for ${DATE}"
          git push
